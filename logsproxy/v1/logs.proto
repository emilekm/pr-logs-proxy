syntax = "proto3";

package logsproxy.v1;

option go_package = "github.com/emilekm/pr-logs-proxy/logsproxy/v1";

enum AdminAction {
  ADMIN_ACTION_UNSPECIFIED = 0;
  ADMIN_ACTION_AA = 1;
  ADMIN_ACTION_ALLOWEDID = 2;
  ADMIN_ACTION_BAN = 3;
  ADMIN_ACTION_BANID = 4;
  ADMIN_ACTION_FLY = 5;
  ADMIN_ACTION_HASH = 6;
  ADMIN_ACTION_INIT = 7;
  ADMIN_ACTION_KICK = 8;
  ADMIN_ACTION_KILL = 9;
  ADMIN_ACTION_MAPVOTE = 10;
  ADMIN_ACTION_MAPVOTERESULT = 11;
  ADMIN_ACTION_MESSAGE = 12;
  ADMIN_ACTION_RELOAD = 13;
  ADMIN_ACTION_REPORT = 14;
  ADMIN_ACTION_REPORTP = 15;
  ADMIN_ACTION_RESIGN = 16;
  ADMIN_ACTION_RESIGNALL = 17;
  ADMIN_ACTION_RUNNEXT = 18;
  ADMIN_ACTION_SAY = 19;
  ADMIN_ACTION_SAYTEAM = 20;
  ADMIN_ACTION_SCRAMBLE = 21;
  ADMIN_ACTION_SETNEXT = 22;
  ADMIN_ACTION_STOPSERVER = 23;
  ADMIN_ACTION_SWAPTEAMS = 24;
  ADMIN_ACTION_SWITCH = 25;
  ADMIN_ACTION_TEMPBAN = 26;
  ADMIN_ACTION_TICKETS = 27;
  ADMIN_ACTION_TIMEBAN = 28;
  ADMIN_ACTION_TIMEBANID = 29;
  ADMIN_ACTION_UNBAN = 30;
  ADMIN_ACTION_UNBANID = 31;
  ADMIN_ACTION_UNBANNAME = 32;
  ADMIN_ACTION_UNGRIEF = 33;
  ADMIN_ACTION_WARN = 34;
}

message AdminLogEntry {
  int64 timestamp = 1;
  AdminAction action = 2;
  string action_str = 3;
  string issuer = 4;
  string target = 5;
  string details = 6;
}
message AdminLogUpdatesRequest { optional uint64 line_number = 1; }
message AdminLogUpdatesResponse {
  AdminLogEntry entry = 1;
  uint64 line_number = 2;
}
message AdminsLogsRequest {}
message AdminsLogsResponse { repeated AdminLogEntry entries = 1; }

service AdminLogService {
  rpc AdminLogUpdates(AdminLogUpdatesRequest)
      returns (stream AdminLogUpdatesResponse);
  rpc AdminsLogs(AdminsLogsRequest) returns (AdminsLogsResponse);
}

enum AccountStatus {
  ACCOUNT_STATUS_UNSPECIFIED = 0;
  ACCOUNT_STATUS_LEGACY = 1;
  ACCOUNT_STATUS_WHITELISTED = 2;
  ACCOUNT_STATUS_VAC_BANNED = 3;
}

message JoinLogEntry {
  int64 timestamp = 1;
  string key_hash = 2;
  uint32 trust_level = 3;
  string name = 4;
  int64 created_at = 5;
  fixed32 ipv4 = 6;
  AccountStatus status = 7;
}
message JoinLogUpdatesRequest { optional uint64 line_number = 1; }
message JoinLogUpdatesResponse {
  JoinLogEntry entry = 1;
  uint64 line_number = 2;
}
message JoinLogsRequest {}
message JoinLogsResponse { repeated JoinLogEntry entries = 1; }

service JoinLogService {
  rpc JoinLogUpdates(JoinLogUpdatesRequest)
      returns (stream JoinLogUpdatesResponse);
  rpc JoinLogs(JoinLogsRequest) returns (JoinLogsResponse);
}

message PlayerProfileEntry {
  int64 timestamp = 1;
  string key_hash = 2;
  uint32 trust_level = 3;
  string username = 4;
}
message PlayerProfilesUpdatesRequest { optional uint64 line_number = 1; }
message PlayerProfilesUpdatesResponse {
  PlayerProfileEntry entry = 1;
  uint64 line_number = 2;
}
message PlayerProfilesLogsRequest {}
message PlayerProfilesLogsResponse { repeated PlayerProfileEntry entries = 1; }

service PlayerProfilesService {
  rpc PlayerProfilesUpdates(PlayerProfilesUpdatesRequest)
      returns (stream PlayerProfilesUpdatesResponse);
  rpc PlayerProfilesLogs(PlayerProfilesLogsRequest)
      returns (PlayerProfilesLogsResponse);
}

// Player query messages
message SearchPlayersRequest {
  string player_name = 1; // Search by name
}

message PlayerSearchResult {
  string key_hash = 1;
  string name = 2;
  repeated string other_names = 3;
}

message SearchPlayersResponse { repeated PlayerSearchResult results = 1; }

message PlayerInfoRequest { string key_hash = 1; }

message PlayerIP {
  fixed32 ip = 1; // IPv4 address as uint32
  int64 first_seen = 2;
  int64 last_seen = 3;
}

message BanStatus {
  AdminLogEntry ban = 1;   // Ban action
  AdminLogEntry unban = 2; // Unban action (optional, may be null)
}

message PlayerInfoResponse {
  string key_hash = 1;
  repeated string names = 2; // All names associated with this hash
  repeated PlayerIP ips = 3; // All IPs associated with this hash
  BanStatus ban_status = 4;  // Ban and unban actions (optional)
}

message PlayerLogsRequest {
  string key_hash = 1;
  int64 from_timestamp = 2; // Optional: only return logs after this timestamp
}

message PlayerLogsResponse {
  repeated AdminLogEntry admin_logs = 1; // Admin actions related to this player
}

message ConnectedPlayersRequest {
  string key_hash = 1; // The keyHash to find connected players for
}

message ConnectionInfo {
  string key_hash = 1;     // The connected player's keyHash
  string via_key_hash = 2; // The keyHash that led to discovering this
  fixed32 via_ip = 3;      // The IP address that connected them
  int32 distance_hops = 4; // Number of hops from the original keyHash
}

message ConnectedPlayersResponse {
  repeated ConnectionInfo connections =
      1; // How each player is connected to the original keyHash
}

service PlayerQueryService {
  rpc SearchPlayers(SearchPlayersRequest) returns (SearchPlayersResponse);
  rpc PlayerInfo(PlayerInfoRequest) returns (PlayerInfoResponse);
  rpc PlayerLogs(PlayerLogsRequest) returns (PlayerLogsResponse);
  rpc ConnectedPlayers(ConnectedPlayersRequest)
      returns (ConnectedPlayersResponse);
}
